# Safety-first CI for the nmap C-to-Rust port (nmap-rs/ workspace).
# Adapted from porting-kit/harnesses/ci/porting-ci.template.yml. Organized around
# the kit's SAFETY GATES, not OS coverage.
#
# LESSONS #5 — path-scoped to nmap-rs/** + porting-kit/** so it never triggers the
# heavy C autotools build (build.yml), and the C build never triggers on Rust-only
# changes (see the paths added to build.yml).
name: nmap-rs-ci

on:
  push:
    branches: [master, 'claude/**']
    paths: ['nmap-rs/**', 'porting-kit/**', '.github/workflows/nmap-rs-ci.yml']
  pull_request:
    paths: ['nmap-rs/**', 'porting-kit/**', '.github/workflows/nmap-rs-ci.yml']

permissions:
  contents: read

defaults:
  run:
    working-directory: nmap-rs

jobs:
  build-test:
    name: build + test + clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }
      - run: cargo fmt --all -- --check
      # -D warnings escalates the workspace safety lints (arithmetic_side_effects,
      # cast_possible_truncation, undocumented_unsafe_blocks, missing_safety_doc)
      # to hard errors. Explicit -D flags are belt-and-suspenders (LESSONS #3).
      - run: >
          cargo clippy --all-targets --
          -D warnings
          -D clippy::missing_safety_doc
          -D clippy::undocumented_unsafe_blocks
      - run: cargo test --all

  unsafe-audit:
    name: unsafe-audit (hard fail on undocumented unsafe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      # Fails if ANY `unsafe {}` block lacks a // SAFETY: comment. Run from repo
      # root against the workspace crates.
      - run: python3 porting-kit/harnesses/unsafe-audit/audit_unsafe.py nmap-rs/crates/
        working-directory: .

  supply-chain:
    name: supply-chain (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit cargo-deny --locked
      - run: cargo audit
      - run: cargo deny check

  miri:
    name: miri (UB in unsafe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with: { components: miri }
      - run: cargo +nightly miri test

  # NOTE: no ThreadSanitizer gate. The host-group driver's race-freedom is
  # *structural* — all scheduler state is mutated by the single driver task and
  # probe tasks capture only `Copy`/owned data, so `JoinSet::spawn`'s `Send`
  # bound rejects shared mutable state at compile time. Full-program TSan of a
  # tokio multi-threaded runtime reports false positives from tokio's own
  # lock-free scheduler (and app code runs *inside* the runtime, so suppressions
  # can't cleanly separate the two), which makes it an unsound gate here rather
  # than a safe one. See LESSONS (M2 retrospective).

  # --- Gates below activate as their inputs land (kept wired, self-skip until then) ---

  fuzz-smoke:
    name: fuzz (60s smoke per untrusted-input parser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with: { components: rust-src }
      - run: |
          if [ ! -d fuzz ]; then echo "no fuzz/ dir yet — skipping"; exit 0; fi
          cargo install cargo-fuzz --locked
          # Fuzz each target from its hand-authored seed corpus. Any panic/crash
          # on arbitrary input is a release blocker (Phase 4, gate 3).
          for t in $(cargo fuzz list); do
            cargo fuzz run "$t" fuzz/seeds/"$t" -- -max_total_time=60 -print_final_stats=1
          done

  differential:
    name: differential vs C nmap oracle (M1 connect scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # The C oracle: distro nmap. project.py compares only the semantic scan
      # result (host status + open-port state/reason + closed counts), so the
      # exact nmap version's decorative output does not affect the verdict.
      - run: sudo apt-get update && sudo apt-get install -y nmap
      - run: cargo build --release
      # Fixture listeners + both binaries + diff_run.py over the M1 matrix.
      # Fails on any UNLEDGERED divergence in port-state fidelity.
      - run: bash tests/differential/run_differential.sh
