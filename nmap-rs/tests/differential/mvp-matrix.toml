# M1 connect-scan differential matrix — the behavioral contract nmap-rs must
# match against C nmap, over the loopback fixture in run_differential.sh
# (open ports 18080 & 18443 have listeners; every other port is closed → RST).
#
# Each [[case]] runs BOTH tools with `args`; the wrapper appends `-oX -` and pipes
# through project.py, so we compare the canonical semantic projection (host
# status + open-port state/reason + closed/filtered counts), not raw output.
# `-Pn` makes host state deterministic (no discovery variance); `-n` skips rDNS.
# Grow this every time a bug escapes: add the case that would have caught it.

[[case]]
name = "mixed-open-closed"
args = ["-sT", "-Pn", "-n", "-p", "18080,18443,18081,19999", "127.0.0.1"]

[[case]]
name = "single-open"
args = ["-sT", "-Pn", "-n", "-p", "18080", "127.0.0.1"]

[[case]]
name = "all-closed"
args = ["-sT", "-Pn", "-n", "-p", "18081,18082,19998,19999", "127.0.0.1"]

# Range spec (18078-18082): exercises port-range expansion; only 18080 is open.
[[case]]
name = "port-range"
args = ["-sT", "-Pn", "-n", "-p", "18078-18082", "127.0.0.1"]

# List + range mixed, out of order: canonical projection sorts, so order-agnostic.
[[case]]
name = "list-and-range-unsorted"
args = ["-sT", "-Pn", "-n", "-p", "19999,18080-18081,18443", "127.0.0.1"]

# Multi-host group: 127.0.0.1 has the listeners, 127.0.0.2 (also loopback) does
# not. Exercises the shared group window across hosts. The projection aggregates
# closed counts across both hosts, so both tools must agree on the totals.
[[case]]
name = "two-host-group"
args = ["-sT", "-Pn", "-n", "-p", "18080,18443,18081", "127.0.0.1", "127.0.0.2"]

# Rate-limited: --max-rate must not change the results, only the pacing.
[[case]]
name = "mixed-max-rate"
args = ["-sT", "-Pn", "-n", "--max-rate", "5000", "-p", "18080,18443,18081,19999", "127.0.0.1"]

# Min-rate floor: likewise result-invariant.
[[case]]
name = "mixed-min-rate"
args = ["-sT", "-Pn", "-n", "--min-rate", "100", "-p", "18080,18443,18081,19999", "127.0.0.1"]
